#-----------------------------------------------------------------------------------------------------------------------
# Keycloak settings
#-----------------------------------------------------------------------------------------------------------------------
keycloak.realm=public-library
keycloak.resource=spring-boot-legacy-docker
keycloak.auth-server-url=https://keycloak:8443/auth
#possible choices: external, all
keycloak.ssl-required=all

# Keycloak settings for legacy application using Basic authentication
# If set to true, the adapter will not send credentials for the client to Keycloak. This is OPTIONAL. The default value is false.
keycloak.public-client=false
keycloak.principal-attribute=preferred_username
keycloak.enable-basic-auth=true
keycloak.credentials.secret=e5364f7f-a48c-4eae-98a6-c8458561b05c
